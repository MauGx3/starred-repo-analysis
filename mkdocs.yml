site_name: Starred Repo Analysis
site_description: Analyze starred GitHub repositories and generate project-aware recommendations.
site_url: https://MauGx3.github.io/starred-repo-analysis
repo_url: https://github.com/MauGx3/starred-repo-analysis
repo_name: MauGx3/starred-repo-analysis

strict: false

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: material

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Scanner CLI: scanner-cli.md
  - Recommender Engine: recommender-engine.md
  - Workflow Guide: starred-repository-scanner.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
